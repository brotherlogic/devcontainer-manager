name: Validate PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Gemini AI PR Reviewer"]
    types:
      - completed

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Ensure PR Code
        id: ensure_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Attempt to find the PR associated with the branch of the triggering run
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
            PR_NUMBER=$(gh pr list -H "$HEAD_BRANCH" --limit 1 --json number --jq '.[0].number')
            
            if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
              # Fallback to the latest open PR if branch check fails
              PR_NUMBER=$(gh pr list -s open --limit 1 --json number --jq '.[0].number')
            fi
            
            echo "Triggered by workflow_run ($HEAD_BRANCH). PR identified: $PR_NUMBER"
            gh pr checkout $PR_NUMBER
            echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          else
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          fi

          # Detect Go changes
          BASE_BRANCH="main"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
             BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          fi
          
          echo "Comparing against $BASE_BRANCH"
          git fetch origin $BASE_BRANCH --depth=1
          CHANGED_GO_FILES=$(git diff --name-only origin/$BASE_BRANCH...HEAD | grep -E '\.go$|go\.mod|go\.sum' || true)
          
          if [ -n "$CHANGED_GO_FILES" ]; then
            echo "go_changed=true" >> $GITHUB_OUTPUT
            echo "Go files changed: $CHANGED_GO_FILES"
          else
            echo "go_changed=false" >> $GITHUB_OUTPUT
            echo "No Go files changed."
          fi
      
      - name: Setup Go
        if: steps.ensure_pr.outputs.go_changed == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Vet
        if: steps.ensure_pr.outputs.go_changed == 'true'
        run: |
          go build -v ./...
          go vet ./...

      - name: Check AI Review Addressed
        if: steps.ensure_pr.outputs.go_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=${{ github.repository }}

          echo "Fetching latest commit timestamp..."
          LATEST_COMMIT_DATE=$(gh api repos/$REPO/pulls/$PR_NUMBER/commits --jq '.[-1].commit.committer.date')
          echo "Latest commit date: $LATEST_COMMIT_DATE"

          echo "Fetching latest Gemini AI Code Review timestamp..."
          # Fetch reviews, filter for github-actions[bot] and the specific comment string, get the last one's submitted_at
          LATEST_REVIEW_DATE=$(gh api repos/$REPO/pulls/$PR_NUMBER/reviews --jq '[.[] | select(.user?.login == "github-actions[bot]" and (.body != null) and (.body | contains("Gemini AI Code Review")))] | last | .submitted_at')
          
          if [ -z "$LATEST_REVIEW_DATE" ] || [ "$LATEST_REVIEW_DATE" = "null" ]; then
            echo "No Gemini AI Code Review found. Checking for /gemini-review command..."
            HAS_REQUEST=$(gh api repos/$REPO/issues/$PR_NUMBER/comments --jq '[.[] | select(.body | contains("/gemini-review"))] | length')
            if [ "$HAS_REQUEST" -gt 0 ]; then
                echo "Success: Gemini AI Code Review was requested and it correctly found 0 issues (no review object was created)."
                exit 0
            fi
            echo "Error: No Gemini AI Code Review or /gemini-review command found. You must request a review before this PR can be validated."
            exit 1
          fi

          echo "Latest AI review date: $LATEST_REVIEW_DATE"

          # Use Unix timestamps for accurate comparison
          COMMIT_TS=$(date -d "$LATEST_COMMIT_DATE" +%s)
          REVIEW_TS=$(date -d "$LATEST_REVIEW_DATE" +%s)

          if [ "$REVIEW_TS" -gt "$COMMIT_TS" ]; then
            echo "::error::There are unaddressed Gemini AI Code Review comments! Please push a new commit adjusting the code to satisfy the AI Review."
            exit 1
          fi

          echo "All Gemini AI Code Reviews have been addressed by subsequent commits."
